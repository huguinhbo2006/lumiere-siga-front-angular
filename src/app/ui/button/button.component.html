<button class="ui-button" [class]="'ui-button ' + variant + ' ' + size" [disabled]="disabled || loading" (click)="onClick()">

  @if (loading) {

    <span class="spinner-border spinner-border-sm"></span>

  } @else {

    @if (icon) {

      <i [class]="icon"></i>

    }

  }

  <span>

    <ng-content></ng-content>

  </span>

</button>
