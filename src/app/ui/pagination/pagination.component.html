<div class="ui-pagination">

    <button class="ui-pagination-button" [disabled]="page <= 1" (click)="previous()">
    Anterior
  </button>

    <div class="ui-pagination-info">

        Página {{ page }} de {{ totalPages }}

    </div>

    <button class="ui-pagination-button" [disabled]="page >= totalPages" (click)="next()">
    Siguiente
  </button>

</div>
