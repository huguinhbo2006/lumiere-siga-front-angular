<ui-card title="Enterprise Table">

    <ui-table [columns]="columns" [data]="data" [config]="config" (rowClicked)="onRowClick($event)" (actionClicked)="onAction($event)">

        <ng-template tableColumn="usuario" let-row>

            <div class="employee-cell">

                <div class="employee-avatar">

                    {{ row.avatar }}

                </div>

                <div class="employee-info">

                    <strong>
            {{ row.nombre }}
          </strong>

                    <small>
            {{ row.correo }}
          </small>

                </div>

            </div>

        </ng-template>

    </ui-table>

</ui-card>
