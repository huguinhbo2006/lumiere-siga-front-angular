<aside
    class="sidebar"
    [class.sidebar--classic]="layoutService.mode() === 'classic'"
    [class.sidebar--rail]="layoutService.mode() === 'rail'"
    [class.sidebar--collapsed]="layoutService.collapsed()">

    <div class="logo">

        <div class="logo-icon" title="Nova UI">
            N
        </div>

        @if (showLabels) {

            <div class="logo-text">
                Nova UI
            </div>

        }

    </div>

    <nav class="menu">

        @for (module of menuService.modules(); track module.nombre) {

        <div class="menu-module">

            <div
                class="module-title"
                [title]="module.nombre"
                (click)="toggleModule(module.nombre)">

                <div class="module-info">

                    <i [class]="module.icono + ' ' + module.color"></i>

                    @if (showLabels) {

                        <span>{{ module.nombre }}</span>

                    }

                </div>

                @if (showLabels) {

                    <i class="fa-solid fa-chevron-down arrow" [class.rotate]="openModule === module.nombre"></i>

                }

            </div>

            @if (openModule === module.nombre) { @for (option of module.opciones; track option.ruta) {

            <a class="menu-item" [title]="option.nombre">

                <i [class]="option.icono + ' ' + option.color"></i>

                @if (showLabels) {

                    <span>{{ option.nombre }}</span>

                }

            </a>

            } }

        </div>

        }

    </nav>

</aside>
